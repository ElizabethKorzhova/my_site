<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Realtime Demo</title>
</head>
<body>
    <h3>Realtime WebSocket Demo</h3>
    <p>
        Online users:
        <strong id="online-count">0</strong>
    </p>

    {% if user.is_authenticated %}
        <p>You are logged in as: <strong>{{ user.username }}</strong></p>
        <label for="notification-input">Notification message</label>
        <input
            id="notification-input"
            type="text"
            placeholder="Enter notification"
        >
        <button id="send-notification-button" type="button">
            Send message
        </button>
    {% else %}
        <p>You are guest. Guests cannot send messages.</p>
    {% endif %}

    <h4>Notifications</h4>
    <ul id="notifications-list"></ul>

    <script>
        const protocol = window.location.protocol === "https:" ? "wss" : "ws";
        const socket = new WebSocket(`${protocol}://${window.location.host}/ws/realtime/`);

        const onlineCountElement = document.getElementById("online-count");
        const notificationsList = document.getElementById("notifications-list");
        const input = document.getElementById("notification-input");
        const button = document.getElementById("send-notification-button");

        socket.onmessage = function (event) {
            const data = JSON.parse(event.data);

            if (data.type === "online_count") {
                onlineCountElement.textContent = data.count;
            }

            if (data.type === "notification") {
                const item = document.createElement("li");
                item.textContent = `${data.username}: ${data.message}`;
                notificationsList.appendChild(item);
            }

            if (data.type === "error") {
                alert(data.message);
            }
        };

        if (button && input) {
            button.addEventListener("click", function () {
                const message = input.value.trim();

                if (!message) {
                    return;
                }

                socket.send(JSON.stringify({
                    type: "notification",
                    message: message
                }));

                input.value = "";
            });
        }
    </script>
</body>
</html>
